name: Semana 13 - CI/CD Gym System

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  pruebas-automatizadas:
    name: Ejecutar pruebas automatizadas con Selenium
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: gym_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verificar versiones instaladas
        run: |
          php -v
          java -version
          mvn -version
          google-chrome --version

      - name: Adaptar conexion de base de datos para GitHub Actions
        run: |
          sed -i "s/private \$host = 'localhost';/private \$host = '127.0.0.1';/" app/config/Database.php
          grep "private \$host" app/config/Database.php

      - name: Importar base de datos del gimnasio
        run: |
          mysql -h 127.0.0.1 -uroot < bk_basededatos.sql

      - name: Crear router para ejecutar el sistema PHP
        run: |
          cat > public/router.php <<'PHP'
          <?php
          $path = parse_url($_SERVER["REQUEST_URI"], PHP_URL_PATH);
          $file = __DIR__ . $path;

          if ($path !== "/" && is_file($file)) {
              return false;
          }

          $url = trim($path, "/");

          if ($url !== "") {
              $_GET["url"] = $url;
          }

          require __DIR__ . "/index.php";
          PHP

      - name: Levantar sistema Gym System
        run: |
          cd public
          nohup php -S 127.0.0.1:8000 router.php > ../server.log 2>&1 &
          sleep 8

      - name: Verificar que el login cargue correctamente
        run: |
          curl -s -L http://127.0.0.1:8000/auth/index -o login.html
          echo "Contenido inicial de login.html:"
          head -80 login.html

          if ! grep -q 'name="email"' login.html; then
            echo "ERROR: No se encontro el campo email en el login."
            echo "Mostrando server.log:"
            cat server.log
            exit 1
          fi

      - name: Verificar sintaxis PHP
        run: |
          find app public -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Ejecutar pruebas Selenium con Maven
        working-directory: gym-system-ui-tests-semana13/gym-system-ui-tests
        run: |
          mvn clean test -Dheadless=true -DwaitSeconds=20 -DbaseUrl=http://127.0.0.1:8000 -DuserEmail=recepcion@gym.com -DuserPassword=123456

      - name: Generar reporte Maven
        if: always()
        working-directory: gym-system-ui-tests-semana13/gym-system-ui-tests
        run: |
          mvn surefire-report:report

      - name: Subir reporte como evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semana-13-gym-system
          path: |
            gym-system-ui-tests-semana13/gym-system-ui-tests/target/surefire-reports/
            gym-system-ui-tests-semana13/gym-system-ui-tests/target/site/
            gym-system-ui-tests-semana13/gym-system-ui-tests/target/reporte-ui/
            gym-system-ui-tests-semana13/gym-system-ui-tests/target/evidencias/
            server.log
            login.html